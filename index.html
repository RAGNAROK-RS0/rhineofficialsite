<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/">
    <title>Rhine Solution | Next-Generation Digital</title>

    <!-- Loading Rubik font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;700;900&display=swap" rel="stylesheet">

    <!-- Load Tailwind entry CSS early (Vite will process this in dev and build) -->
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="/src/App.css">

    <!-- Critical CSS: minimal styles to avoid FOUC when Tailwind isn't applied yet -->
    <link rel="stylesheet" href="/critical.css">

    <style>
      /* This ensures the background is pitch black before the particles load */
      body {
        background-color: #000;
        margin: 0;
        overflow: hidden;
      }

      /* Hides dev GUI controls if they try to pop up */
      [class*="gui"] { 
        display: none !important; 
        visibility: hidden !important; 
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
